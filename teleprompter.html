<script>
const chapters = [{"t":"פרק 0 — אני מבין למה זה לא עבד לכם עד היום","h":"<div class=\"meta\"><b>אורך יעד:</b> 5-7 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> אין — פרק כניסה, ללא שקפים. פנייה ישירה למצלמה לכל אורך הפרק.</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> לא עוד \"פרק מידעי\". פרק כניסה שיוצר הזדהות ואמון — אני מבין בדיוק למה כל מה שניסית עד היום לא החזיק מעמד, ואני הפתרון.</div>\n<h2>פתיחה — הצגה עצמית (0:00-1:00)</h2>\n<p>שלום, אני אביאל עמירה, WNBF Pro.</p>\n<p>לפני שאנחנו צוללים לתוך הפרוטוקול עצמו — אני רוצה לדבר איתכם רגע, פנים מול פנים, בלי שקפים, בלי טבלאות. רק אני ואתם.</p>\n<p>כי אני יודע למה אתם כאן. הגעתם לפרוטוקול הקיץ אחרי שכבר ניסיתם. אולי לא פעם אחת. אולי לא פעמיים. ואני רוצה שתדעו משהו חשוב: אני מבין בדיוק למה זה לא עבד לכם עד היום. וזה לא באשמתכם.</p>\n<h2>מה כבר ניסיתם (1:00-2:45)</h2>\n<p>תנו לי לנחש. ניסיתם דיאטה שראיתם באינסטגרם, עם תפריט קבוע שאף אחד לא שאל אתכם אם הוא מתאים לחיים שלכם. ניסיתם \"להיכנס 100 אחוז\" — בלי סוכר, בלי פחמימה, בלי יציאות, בלי חיים — ואחרי שבוע וחצי נשברתם, כי אף אחד לא מסוגל להחזיק ב-100 אחוז לאורך זמן. זה לא חוסר כוח רצון. זו פשוט לא שיטה שבנויה לבני אדם אמיתיים.</p>\n<p>ואולי המומחה הבא שנתקלתם בו דיבר אליכם בשפה שלא הבנתם — נוסחאות, מונחים, בלי הסבר. או הבטיח לכם קיצורי דרך שפשוט לא קיימים בפיזיולוגיה.</p>\n<p>אני מכיר את כל התירוצים, כי שמעתי אותם אלף פעם. וגם אני מכיר את התסכול — כי גם אני הייתי שם, בצד השני, לפני שהבנתי איך זה באמת עובד.</p>\n<h2>למה זה לא עבד — לא אתם, השיטה (2:45-4:30)</h2>\n<p>הבעיה לא הייתה בכם. הבעיה הייתה שניסיתם להיכנס לתהליך בלי להבין את הפיזיולוגיה שמאחוריו. ניסיתם לפעול \"100 אחוז מושלם\", כשהמחקר מראה שוב ושוב שגמישות, לא נוקשות, היא מה שמייצר תוצאות לטווח ארוך.</p>\n<p>ניסיתם \"לנחש\" — כמה קלוריות, כמה חלבון, כמה להתאמן — במקום לדעת. וכשאתם מנחשים, אתם או מגזימים ונשברים, או ממעיטים ולא רואים תוצאה, ומתייאשים.</p>\n<p>זה בדיוק מה שאני הולך לתקן ב-15 הימים הקרובים. לא עוד ניחושים. לא עוד נוקשות שנשברת. פרוטוקול מבוסס מדע, שבנוי בשביל בני אדם אמיתיים עם חיים אמיתיים — עבודה, משפחה, אירועים חברתיים, שישי בערב.</p>\n<h2>אני הפתרון שלכם (4:30-5:45)</h2>\n<p>אני אביאל עמירה. WNBF Pro. ואני לא כאן כדי לתת לכם עוד תפריט קשיח שתשברו תוך שבוע.</p>\n<p>אני כאן כדי ללמד אתכם איך הגוף שלכם באמת עובד — TDEE, NEAT, LBM, כל המושגים שתשמעו ב-15 הימים הקרובים — כדי שתדעו לנהל את עצמכם, לא רק לעקוב אחרי הוראות בלי להבין למה.</p>\n<p>זה ההבדל בין עוד דיאטה, לבין מיומנות שנשארת אצלכם לכל החיים.</p>\n<h2>סגירה — מה מצפה לכם (5:45-6:30)</h2>\n<p>אז לפני שמתחילים — אני רוצה שתשחררו את כל מה שניסיתם וזה לא עבד. זה לא אתם. זו הייתה השיטה הלא נכונה.</p>\n<p>15 יום, יום אחרי יום, אני הולך לתת לכם את הכלים האמיתיים. בלי מיתוסים, בלי ניחושים. הסוף לניחושים — הגיע הזמן לעבוד כמו PRO.</p>\n<p>יום 1 מתחיל עכשיו. בואו נלך.</p>"},{"t":"יום 1 — הסוף לניחושים: הפיזיקה של החיטוב","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 1.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> לפני שנוגעים באוכל — מבינים למה המאזניים משקרות, למה 7,700 קלוריות הן החוק שמנהל הכל, ולמה מבוגר אחראי מפסיק לפחד מהמספר.</div>\n<h2>שקף 1 — פתיחה (0:00-1:00)</h2>\n<div class=\"cue\">[שקף: כותרת \"פרוטוקול הקיץ\" — שינוי התנהלות מבוסס מדע ב-15 ימים]</div>\n<p>שלום, אני אביאל עמירה, WNBF Pro. ברוכים הבאים לפרוטוקול הקיץ.</p>\n<p>15 יום. שינוי התנהלות מבוסס מדע. לא עוד דיאטה שמבוססת על ניחושים, על \"זה עבד לחבר שלי\", על תחושות בטן. הסוף לניחושים — הגיע הזמן לעבוד כמו PRO.</p>\n<p>אני רוצה שתדעו משהו לפני שאנחנו מתחילים: כל מה שאני הולך ללמד אתכם ב-15 הימים האלה מבוסס על פיזיולוגיה אמיתית, לא על טרנדים. ואם תעקבו אחרי זה בדיוק כמו שאני מלמד — תסיימו את הפרוטוקול הזה עם ידע שרוב האנשים בחדר הכושר פשוט אין להם. בואו נתחיל.</p>\n<h2>שקף 2 — למה המשקל הוא שקרן? (1:00-3:30)</h2>\n<div class=\"cue\">[שקף: תמונת מאזניים, 84.5 ק\"ג]</div>\n<p>השאלה הראשונה שאני שואל כל מתאמן חדש: למה המשקל הוא שקרן?</p>\n<p>תראו, המספר שקופץ לכם על המאזניים בבוקר לא מספר לכם רק על שומן. הוא מספר לכם על ארבעה דברים שונים בבת אחת, ורובם לא קשורים בכלל לשומן.</p>\n<p><b>הראשון — אצירת נוזלים.</b> נתרן, כלומר מלח, ופחמימות — שניהם גורמים לגוף לאצור מים. זאת לא תופעה מסתורית, זו כימיה בסיסית. אכלתם ארוחה מלוחה אתמול בערב? הבוקר תשקלו יותר. וזה לא שומן. זה מים.</p>\n<p><b>השני — דלקת שריר.</b> ואני לא מדבר על דלקת רעה. אימונים עצימים גורמים לרקמת השריר לספוח נוזלים לצורך תיקון. זה חלק מהתהליך הבריא של בניית שריר. אבל זה אומר שיום אחרי אימון כבד, אתם עשויים לשקול יותר — וזה בהחלט לא אומר שהשמנתם.</p>\n<p><b>השלישי — סטרס.</b> קורטיזול גבוה — הורמון הלחץ — מעודד אצירת נוזלים תת-עורית. וזה בדיוק מה ש\"מסתיר\" את החיטוב שלכם. יש לכם שבוע לחוץ בעבודה? המשקל יכול לעלות בלי שום קשר לתזונה שלכם.</p>\n<p>אז מה הפתרון? <b>התעלמות מוחלטת מתנודות יומיות, והתמקדות אך ורק בממוצע השבועי.</b> זה העיקרון שילווה אתכם לכל אורך הפרוטוקול, ומחר נלמד בדיוק איך עושים את זה בפועל.</p>\n<h2>שקף 3 — המספר שמשנה הכל: 7,700 קלוריות (3:30-6:00)</h2>\n<div class=\"cue\">[שקף: \"7700 קלוריות\" — הפיזיקה של החיטוב]</div>\n<p>עכשיו אני הולך לתת לכם את המספר הכי חשוב בכל הפרוטוקול הזה. תזכרו אותו: <b>7,700.</b></p>\n<p>זו הפיזיקה של החיטוב. כדי לצבור — או לאבד — קילו אחד של שומן טהור, הגוף שלכם זקוק לעודף, או לגירעון, של 7,700 קלוריות מעל התחזוקה שלו.</p>\n<p>זה לא דעה. זו לא שיטה שאני המצאתי. זו עובדה פיזיקלית שתקפה לכל אדם על פני כדור הארץ.</p>\n<p>בואו נדבר רגע על פרופורציות, כי זה בדיוק המקום שבו אנשים נלחצים בטעות. עליתם קילו אחד בלילה — נגיד אחרי סושי, אחרי ארוחה עתירת נתרן? זה לא פיזיולוגית שומן. אין סיכוי שאכלתם 7,700 קלוריות עודפות בארוחה אחת. זה נוזלים. נקודה.</p>\n<p><b>הבנת המספר הזה היא המפתח לשקט הנפשי שלכם בתהליך.</b> כי ברגע שאתם באמת מפנימים שקילו שומן שווה 7,700 קלוריות, אתם מפסיקים להיבהל מכל תנודה קטנה. אתם יודעים שהמתמטיקה עובדת בשקט ברקע, גם כשהמאזניים לא \"מראה\" את זה עדיין.</p>\n<h2>שקף 4 — מיינדסט של \"מבוגר אחראי\" (6:00-8:00)</h2>\n<div class=\"cue\">[שקף: שלושה עמודים — מטרה, התחייבות, ניקוי רעשים]</div>\n<p>עכשיו, איך הופכים את הידע הזה להתנהגות? זה דורש מה שאני קורא לו מיינדסט של \"מבוגר אחראי\".</p>\n<p><b>המטרה</b> — להבין איך המכונה שנקראת הגוף שלכם באמת עובדת. לא ניחושים, לא אינסטגרם. להבין את הפיזיולוגיה עצמה. ידע הוא כוח, ובפרוטוקול הזה אני נותן לכם את הידע האמיתי.</p>\n<p><b>ההתחייבות</b> — 10 דקות ביום של למידה. זה כל מה שנדרש מכם. 10 דקות ביום יתנו לכם ידע שאין ל-99 אחוז מהמתאמנים בחדר הכושר. תחשבו על זה — כמעט כל מי שאתם רואים מתאמן לידכם, מנחש. אתם לא תנחשו יותר.</p>\n<p><b>ניקוי רעשים</b> — מפסיקים להקשיב ל\"מומחי טיקטוק\" ומתחילים להבין פיזיולוגיה אמיתית. יש היום כל כך הרבה רעש ברשתות — כל אחד \"מומחה תזונה\" עם 30 שניות של תוכן. אנחנו כאן בשביל להחליף את זה בהבנה אמיתית, מבוססת מדע.</p>\n<p>זה בדיוק ההבדל בין מי שעושה עוד דיאטה, לבין מי ששולט בגוף שלו לכל החיים.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:00-9:30)</h2>\n<div class=\"cue\">[שקף: החלטה, תיעוד אכילה, הכנה, צפייה]</div>\n<p>ארבע משימות לפני שאתם הולכים לישון היום.</p>\n<p><b>החלטה</b> — מהיום, המשקל בבוקר הוא רק \"דאטה\". נתון יבש. הוא לא גזר דין ליום שלכם. לא משנה מה תראו על המאזניים מחר בבוקר — זה מידע, לא שיפוט על הערך שלכם או ההצלחה שלכם.</p>\n<p><b>תיעוד אכילה</b> — והמשימה המרכזית של היום: פשוט תכתבו. כל, ואני מדגיש כל, מה שאתם אוכלים היום — כל ביס, כל נשנוש, כל מה ש\"לא נחשב\" כי זה היה קטן. בלי לשקר לעצמכם, ובלי לנשנש \"בסתר\". זה לא יום של דיאטה — זה יום של כנות. ברגע שאתם רואים שחור על גבי לבן מה באמת נכנס לכם לפה ביום רגיל, כל השיחה על \"אבל אני לא אוכל כל כך הרבה\" משתנה.</p>\n<p><b>הכנה</b> — מחר אני מלמד אתכם איך לנהל את הנתונים האלו ב-Google Sheets, ואיך למדוד היקפים בצורה מקצועית. זה הבסיס לכל הפרוטוקול, אז תגיעו מוכנים.</p>\n<p><b>צפייה</b> — סיימתם את הסרטון של היום. עכשיו רשמו לעצמכם תובנה אחת מרכזית מהיום — משהו שממש נדלק לכם — ותשלחו לי אותה. אני רוצה לדעת מה תפס אתכם.</p>\n<p>זהו ליום הראשון. הפכתם עכשיו לאנשים שמבינים למה המאזניים משקרות, ומה זה באמת אומר לצבור או לאבד קילו שומן. נתראה מחר, ליום 2 — שם אנחנו בונים את מערכת הבקרה שתלווה אתכם עד הסוף.</p>"},{"t":"יום 2 — מערכת הבקרה של המקצוענים","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 2.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> להוציא את הרגש, להכניס את הדאטה. Google Sheets הוא לא בירוקרטיה — הוא המוח של כל התהליך.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"יום 2 — מערכת הבקרה של המקצוענים\" — להוציא את הרגש, להכניס את הדאטה]</div>\n<p>יום 2. אתמול דיברנו על הפיזיקה של החיטוב — 7,700 קלוריות לקילו שומן. היום אנחנו בונים את הכלי שהופך את הפיזיקה הזאת למשהו שאתם באמת יכולים לעקוב אחריו, יום אחרי יום.</p>\n<p>הכותרת של היום היא פשוטה: להוציא את הרגש, ולהכניס את הדאטה.</p>\n<h2>שקף 2 — Google Sheets: המוח של התהליך (0:45-3:30)</h2>\n<div class=\"cue\">[שקף: תצלום מסך של Google Sheets עם מעקב משקל, שלושה כרטיסים — שקילה יומית, ניקוי רעשים, זיהוי מגמה]</div>\n<p>למה בכלל Google Sheets? למה לא עוד אפליקציה יפה?</p>\n<p>כי Sheets נותן לכם שליטה מלאה על הנתונים, ומאפשר לי לחשב עבורכם באופן אוטומטי את הדבר הכי חשוב בתהליך: <b>הממוצע השבועי.</b></p>\n<p>בואו נבין למה הממוצע השבועי הוא הבוס.</p>\n<p><b>שקילה יומית</b> — אתם מזינים נתון יבש כל בוקר, על קיבה ריקה, אחרי שירותים. זה הבסיס.</p>\n<p><b>ניקוי רעשים</b> — הממוצע השבועי מנטרל את הקפיצות הזמניות שדיברנו עליהן אתמול: נוזלים, מלח, סטרס. במקום להיבהל מכל יום בודד, אתם מסתכלים על הממוצע של שבעת הימים.</p>\n<p><b>זיהוי מגמה</b> — וזה החלק הקריטי: ירידה בממוצע השבועי היא האינדיקטור האמיתי להצלחה בחיטוב. לא הירידה מיום ליום. הירידה מממוצע שבוע לממוצע שבוע.</p>\n<p>תסתכלו על הגרף שאני מראה לכם עכשיו על המסך — זה בדיוק איך זה נראה כשעוקבים נכון. יש תנודות קטנות מדי שבוע, אבל הקו הכללי — יורד בעקביות. זו התמונה שאתם רוצים לראות.</p>\n<h2>שקף 3 — מדידת היקפים: הוכחת האיכות (3:30-6:00)</h2>\n<div class=\"cue\">[שקף: תמונת חזה וידיים עם סרט מידה, שלושה כרטיסים — חזה וידיים, מותניים, ביטוח תוצאה]</div>\n<p>עכשיו — המשקל הוא רק חצי מהסיפור. החצי השני הוא ההיקפים.</p>\n<p><b>חזה וידיים</b> — אנחנו מודדים אותם כדי לוודא שמסת השריר, ה-LBM, נשמרת למרות הגירעון הקלורי. נדבר על LBM בהרחבה ביום 5, אבל תזכרו את המושג הזה מעכשיו — זה מסת הגוף הרזה שלכם, השריר, לא השומן.</p>\n<p><b>מותניים, בטבור</b> — זה המדד המדויק ביותר לירידה אמיתית ברקמת השומן. יותר מדויק מהמשקל עצמו.</p>\n<p>והנה הנקודה שאני רוצה שתפנימו: <b>אם ההיקפים שלכם יורדים במותן, בזמן שהמשקל \"תקוע\" — אתם עדיין מנצחים.</b> זה קורה כל הזמן, במיוחד בשבועות הראשונים, כשיש עדיין תנודות נוזלים. ההיקף הוא מה שמבטח לכם את התוצאה כשהמשקל משקר.</p>\n<h2>שקף 4 — אסטרטגיית המקצוענים מול השיטה הרגילה (6:00-8:00)</h2>\n<div class=\"cue\">[שקף: טבלה — השיטה שלנו מול השיטה הרגילה, 4 פרמטרים]</div>\n<p>בואו נראה את זה אחד מול השני, כי ההבדל דרמטי.</p>\n<p>בניהול משקל — השיטה הרגילה היא שקילה אקראית. השיטה שלנו — ממוצע שבועי מדויק וקר.</p>\n<p>במדידות — השיטה הרגילה היא מבט חטוף במראה. השיטה שלנו — היקפים מלאים ומתועדים.</p>\n<p>בבקרה — השיטה הרגילה היא זיכרון בראש, או פתקים פזורים. השיטה שלנו — מסודר ב-Google Sheets.</p>\n<p>ובהחלטות — השיטה הרגילה מבוססת על מצב רוח יומי. השיטה שלנו מבוססת דאטה יבשה.</p>\n<p>זה בדיוק ההבדל בין מי שמתאמן עשר שנים בלי תוצאה, לבין מי שמגיע לתוצאה תוך חודשים. לא הכישרון. השיטה.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:00-9:30)</h2>\n<div class=\"cue\">[שקף: הורדת הקובץ, נתוני פתיחה, התמדה]</div>\n<p>שלוש משימות.</p>\n<p><b>הורדת הקובץ</b> — צירפתי לכם קובץ Sheets מוכן לתיעוד המשקל, ההיקפים והממוצע שלכם. תורידו אותו עכשיו.</p>\n<p><b>נתוני פתיחה</b> — הזינו את משקל הבוקר וההיקפים שלכם, בדיוק לפי ההנחיות שנתתי.</p>\n<p><b>התמדה</b> — מהיום, כל בוקר מתחיל עם תיעוד המשקל אחרי השירותים. זה הופך להרגל. לא תחשבו על זה יותר, זה פשוט חלק מהשגרה שלכם, כמו לצחצח שיניים.</p>\n<p>וזכרו את המשפט הזה — הוא הליבה של כל הפרוטוקול: <b>מה שלא נמדד — לא מנוהל.</b></p>\n<p>נתראה מחר, ליום 3 — נדבר על הסביבה שאתם חיים בה, ולמה היא קובעת יותר מכוח הרצון שלכם.</p>"},{"t":"יום 3 — חסינות סביבתית","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 3.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> מה שלא בתפריט ובבית — לא נכנס לפה. כוח רצון הוא משאב מוגבל, אבל הסביבה שאתם בונים היא בלתי מוגבלת.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: יום 3 — חסינות סביבתית. \"מה שלא בתפריט ובבית — לא נכנס לפה\"]</div>\n<p>יום 3. היום אנחנו בונים מבצר של הצלחה.</p>\n<p>הכותרת של היום היא משפט אחד שאני רוצה שתחרטו לעצמכם: \"מה שלא בתפריט ובבית — לא נכנס לפה.\"</p>\n<p>זה נשמע פשוט. זה לא. בואו נבין למה.</p>\n<h2>שקף 2 — מלכודת התענוג: הנדסת מזון (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: תמונת ממרחי שוקולד — נוטלה ודומיה. שילוב קטלני, עקיפת שובע, פתרון]</div>\n<p>תראו את התמונה הזאת שאני מציג עכשיו — כמה סוגי ממרח שוקולד. זה לא במקרה שאני בוחר דווקא את המוצר הזה כדוגמה.</p>\n<p><b>השילוב הקטלני</b> — סוכר, שומן ומלח ביחד. זה שילוב שנועד, פשוטו כמשמעו, לגרום להתמכרות פיזיולוגית. חברות המזון הגדולות מעסיקות מדעני מזון שתפקידם היחיד הוא למצוא את \"נקודת האושר\" — הקומבינציה המדויקת שגורמת למוח שלכם לרצות עוד ועוד.</p>\n<p><b>עקיפת השובע</b> — הנדסת המזון הזו \"מרמה\" את מנגנון השובע במוח שלכם וגורמת לאכילת יתר ללא הפסקה. זו לא חולשת אופי שלכם. זו הנדסה מכוונת נגד המוח האנושי.</p>\n<p>אז מה הפתרון? <b>ביצוע \"ריסט\" לבלוטות הטעם, דרך ניקוי אגרסיבי של הסביבה.</b> אנחנו לא נלחמים במוצרים האלה בכוח הרצון. אנחנו פשוט מוציאים אותם מהמשוואה.</p>\n<h2>שקף 3 — ניקוי המטבח: הלכה למעשה (3:15-6:00)</h2>\n<div class=\"cue\">[שקף: אסטרטגיה — ירקות טריים, חלבונים רזים, פחמימות מורכבות. הכלל הראשון]</div>\n<p>האסטרטגיה המעשית: ממלאים את המטבח בחלופות בנפח גבוה ובקלוריות נמוכות שישאירו אתכם שבעים ומרוצים.</p>\n<p>הרבה ירקות טריים. חלבונים רזים זמינים. פחמימות מורכבות. זה מה שאנחנו רוצים שיהיה בהישג יד.</p>\n<p>ועכשיו הכלל הראשון, וזה חוק שאני רוצה שתפנימו: <b>אם זה נמצא במזווה שלכם, בסוף אתם תאכלו את זה.</b> אין דרך אחרת. אל תסמכו על כוח הרצון שלכם בשעות הקשות — בעשר בלילה, אחרי יום עבודה מתיש, כוח הרצון שלכם הוא במינימום.</p>\n<p>הפעולה: <b>להוציא מהבית כל פיתוי שמעקף את המוח.</b> לא \"לצמצם\". להוציא.</p>\n<p>ועכשיו — לאלה מכם שגרים עם בן זוג, הורים, או שותפים לדירה, ולא יכולים פשוט לרוקן את כל המקרר. יש לכם פתרון נוסף: <b>תייחדו לעצמכם שטח</b> — מדף אחד במקרר, מגירה אחת בפריזר — שאתם יודעים בוודאות שהוא רק שלכם. שם נמצא רק מה שתומך בפרוטוקול. ותסבירו לסביבה שלכם מה אתם עושים ולמה — תבקשו מהם לתמוך בכם, ואפילו תזמינו אותם להצטרף. כי בסוף, כולם רוצים להיות יפים וחטובים. לפעמים כל מה שצריך זה שמישהו ילך ראשון.</p>\n<h2>שקף 4 — כוח רצון הוא משאב מוגבל (6:00-8:00)</h2>\n<div class=\"cue\">[שקף: הטעות, השיטה, \"אנחנו מעצבים את הסביבה כדי שהיא תעבוד בשבילנו\"]</div>\n<p>בואו נדבר רגע על הטעות הכי נפוצה שאני רואה: לסמוך על כך שתצליחו להגיד \"לא\" לפיתויים כשאתם רעבים ועייפים בסוף היום.</p>\n<p>זו טעות, כי כוח רצון הוא משאב פיזיולוגי מוגבל. הוא נגמר במהלך היום, ממש כמו סוללה שמתרוקנת. כל החלטה קטנה שאתם מקבלים — מה ללבוש, איך להגיב למייל, איך לדבר עם הילדים — מרוקנת עוד קצת מהסוללה הזו. עד הערב, כשאתם הכי צריכים אותה, היא כבר כמעט ריקה.</p>\n<p>השיטה שלנו: <b>אל תילחמו בפיתוי — פשוט תעלימו אותו מהעין.</b> עיצוב הסביבה הוא המפתח.</p>\n<p>אנחנו מעצבים את הסביבה כדי שהיא תעבוד בשבילנו, לא נגדנו. זו לא חולשה להוציא פיתויים מהבית. זו חוכמה. זה בדיוק מה שמבדיל בין מי שנשאר צמוד לפרוטוקול, לבין מי שנשבר בשבוע השני.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:00-9:30)</h2>\n<div class=\"cue\">[שקף: סריקה, פינוי, הצטיידות]</div>\n<p>שלוש משימות.</p>\n<p><b>סריקה</b> — עוברים מעבר יסודי על המקרר והמזווה, ומזהים את \"האויבים\" — מה שאתם יודעים שמושך אתכם.</p>\n<p><b>פינוי</b> — תורמים או זורקים את מה שלא מקדם אתכם ב-15 הימים הקרובים. לא \"שומרים בצד\". מוציאים מהבית.</p>\n<p><b>הצטיידות</b> — קונים רק מה שמופיע ברשימת הקניות של הפרוטוקול. אני מצרף אותה לכם בהודעה.</p>\n<p>מחר אנחנו נכנסים לנושא TDEE — ואני הולך לשבור לכם מיתוס גדול על החדר כושר. נתראה מחר.</p>"},{"t":"יום 4 — לאן הולכות הקלוריות?","h":"<div class=\"meta\"><b>אורך יעד:</b> 10-12 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 4.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> למה האימון שלכם הוא רק 5% מהתוצאה. מבנה ה-TDEE, וה-NEAT ככוח הסודי שקובע הכל.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"לאן הולכות הקלוריות?\" — מבנה ה-TDEE. \"למה האימון שלכם הוא רק 5% מהתוצאה\"]</div>\n<p>יום 4. ועכשיו אני הולך לשבור לכם מיתוס גדול.</p>\n<p>אתם חושבים שהחדר כושר הוא מה שמרזה אתכם? היום נראה שהתשובה מורכבת הרבה יותר ממה שחשבתם.</p>\n<h2>שקף 2 — עוגת הקלוריות: ה-TDEE (0:45-3:30)</h2>\n<div class=\"cue\">[שקף: עוגת פאי TDEE — BMR 70%, NEAT 15%, TEF 10%, EAT 5%]</div>\n<p>תסתכלו על העוגה שאני מראה לכם עכשיו. זה ה-TDEE שלכם — ה-Total Daily Energy Expenditure, ההוצאה האנרגטית היומית הכוללת שלכם. ארבעה חלקים.</p>\n<p><b>BMR, 70 אחוז</b> — חילוף חומרים בסיסי. זה מה שהגוף שלכם שורף רק כדי לשמור אתכם בחיים — לנשום, לחשוב, ללב לפעום. גם אם לא הייתם זזים כל היום, רוב הקלוריות שלכם היו הולכות לכאן.</p>\n<p><b>NEAT, 15 אחוז</b> — תנועה יומיומית לא יזומה. צעדים, עמידה, מדרגות, כל תזוזה שהיא לא אימון מסודר.</p>\n<p><b>TEF, 10 אחוז</b> — אנרגיה שהגוף מוציא כדי לעכל את האוכל עצמו. וכן, לחלבון יש את ה-TEF הגבוה ביותר מכל אבות המזון.</p>\n<p><b>EAT, 5 אחוז</b> — זה האימון היזום שלכם. חדר הכושר.</p>\n<p>ראיתם את זה? <b>החדר כושר הוא רק 5 אחוז מההוצאה הקלורית היומית שלכם.</b></p>\n<h2>שקף 3 — מלכודת האימון (3:30-5:45)</h2>\n<div class=\"cue\">[שקף: שיטה, עובדה, טעות — שלושה כרטיסים]</div>\n<p>הטעות הכי נפוצה שאני רואה: לחשוב שאימון אינטנסיבי מאפשר \"לאכול מה שרוצים\".</p>\n<p>והעובדה: קל מאוד לצרוך ב-5 דקות של אכילה את מה ששרפתם בשעה שלמה של אימון מפרך. כוס מיץ, פרוסת עוגה — וכל השריפה הקלורית של השעה בחדר הכושר נמחקה.</p>\n<p>אז מה השיטה שלנו? <b>אנחנו משתמשים באימון ככלי לשימור שריר, ולא ככלי המרכזי ליצירת גירעון קלורי.</b> האימון קריטי — אבל לא בשביל מה שחשבתם. נדבר על זה בהרחבה ביום 9.</p>\n<h2>שקף 4 — הכוח הסודי של ה-NEAT (5:45-8:15)</h2>\n<div class=\"cue\">[שקף: זיהוי מצב, למה זה קריטי, הפתרון — \"תנועה = חופש קלורי\"]</div>\n<p>עכשיו לחלק הכי חשוב של היום — ה-NEAT.</p>\n<p><b>זיהוי מצב</b> — בחיטוב, הגוף שלכם \"מכבה\" תנועות קטנות כדי לחסוך באנרגיה, בגלל הגירעון הקלורי. זה קורה לא מודע לגמרי — פחות תזוזות ידיים, פחות קימה מהכיסא, הליכה איטית יותר.</p>\n<p><b>למה זה קריטי</b> — ירידה ב-NEAT יכולה לעצור ירידה במשקל גם אם אתם אוכלים פחות. זה בדיוק המקום שרוב הדיאטות נתקעות. אתם אוכלים בגירעון, אבל הגוף \"מפצה\" על ידי הפחתת תנועה יומיומית — והתוצאה: המשקל תקוע.</p>\n<p><b>הפתרון</b> — הצמדות ליעד צעדים קשיח, כדי למנוע את \"מצב חיסכון באנרגיה\" הזה.</p>\n<p>תזכרו את המשפט הזה: <b>תנועה = חופש קלורי.</b> ככל שהתנועה היומיומית שלכם גבוהה יותר, ככה יש לכם יותר \"מקום\" לאכול ועדיין להיות בגירעון.</p>\n<h2>מילה על תוכנית האימונים שלכם (8:15-9:15)</h2>\n<div class=\"cue\">[שקף: ללא — פנייה ישירה למצלמה]</div>\n<p>ולפני שעוברים למשימה — משהו שאני רוצה להציע לכם. יש לכם כבר תוכנית אימון שאתם עובדים לפיה?</p>\n<p>אם כן — שלחו לי אותה, בחינם. אני אעבור עליה ואדייק אותה עבורכם, כך שהיא תשרת את הפרוטוקול הזה בול.</p>\n<p>ואם אין לכם תוכנית, ואתם רוצים שאבנה לכם אחת מאפס — אתם מוזמנים לתאם איתי שיחה. ובגלל שאתם חלק מהקורס הזה, אני אבנה לכם אותה במחיר של 99 שקל — זה חצי מהמחיר הרגיל שאני גובה על בניית תוכנית אימון מותאמת אישית. זה לא בשביל כולם — זה בשביל מי שחלק מהקהילה שלי.</p>\n<h2>שקף 5 — המשימה שלכם היום (9:15-10:45)</h2>\n<div class=\"cue\">[שקף: בדיקה, קביעת יעד, אקטיביות]</div>\n<p>שלוש משימות.</p>\n<p><b>בדיקה</b> — מה הממוצע היומי שלכם של צעדים בשבוע האחרון? בדקו בנייד או בשעון עכשיו.</p>\n<p><b>קביעת יעד</b> — קבעו יעד צעדים יומי קבוע. למשל, 8,000 עד 10,000 צעדים. אם אתם מתחילים ממקום נמוך — תעלו בהדרגה.</p>\n<p><b>אקטיביות</b> — מצאו שלוש דרכים להוסיף תנועה: מדרגות במקום מעלית, חניה רחוקה יותר, או הליכה בזמן שיחת טלפון.</p>\n<p>זכרו — תנועה שווה חופש קלורי. מחר אנחנו נכנסים לחלק 2 של הפרוטוקול — מנוע התזונה המעשי, עם LBM ו-DIAAS. נתראה מחר.</p>"},{"t":"יום 5 — אסטרטגיית המקצוענים: לחשב כמו PRO","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 5.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> למה המשקל הכללי שלכם לא מעניין אותנו. חישוב חלבון וקלוריות לפי LBM, ואיכות חלבון לפי DIAAS.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"אסטרטגיית המקצוענים — לחשב כמו PRO: מעבר למספר שעל המשקל\". \"למה המשקל הכללי שלכם לא מעניין אותנו\"]</div>\n<p>יום 5. אתמול דיברנו על TDEE וצעדים. היום אנחנו נכנסים לשלב 2 של הפרוטוקול — המנוע התזונתי המעשי.</p>\n<p>והכותרת של היום מפתיעה: המשקל הכללי שלכם לא מעניין אותנו. תיכף תבינו למה.</p>\n<h2>שקף 2 — חישוב לפי LBM, מסה רזה (0:45-3:45)</h2>\n<div class=\"cue\">[שקף: טבלת LBM לפי משקל וגובה. מה זה LBM, הטעות, השיטה, התוצאה]</div>\n<p><b>מה זה LBM?</b> משקל הגוף שלכם, ללא רקמת השומן. כלומר — שרירים, עצמות, איברים ומים. זה מה שנשאר כשמורידים את השומן מהמשוואה.</p>\n<p><b>הטעות</b> שכמעט כולם עושים: חישוב חלבון וקלוריות לפי המשקל הכללי, שכולל את השומן שאנחנו בכלל רוצים להוריד. חשבו על זה רגע — למה שתחשבו כמה חלבון אתם צריכים על סמך רקמה שאתם מנסים לפרק?</p>\n<p><b>השיטה שלנו</b> — אנחנו מזינים חלבון ואנרגיה כדי לתחזק אך ורק את רקמת השריר. לא את השומן.</p>\n<p><b>התוצאה</b> — דיוק מקסימלי שמונע איבוד שריר מיותר במהלך החיטוב. זה ההבדל בין מי שיורד במשקל ונראה \"רזה ורך\", לבין מי שיורד במשקל ונראה חטוב.</p>\n<p>תסתכלו על הטבלה שאני מראה לכם — היא מראה לכם איך למצוא את ה-LBM המשוער שלכם לפי משקל וגובה. אבל אל תדאגו לחישוב הידני — הקובץ שקיבלתם מחשב את זה עבורכם אוטומטית.</p>\n<h2>שקף 3 — מדד DIAAS: איכות החלבון (3:45-6:30)</h2>\n<div class=\"cue\">[שקף: לא כל גרם שווה, מדד DIAAS, העדיפות בחיטוב]</div>\n<p>עכשיו שאתם יודעים כמה חלבון אתם צריכים — בואו נדבר על <b>איכות</b> החלבון, לא רק כמות.</p>\n<p><b>לא כל גרם שווה</b> — גרם חלבון מאורז לא נספג בגוף שלכם כמו גרם חלבון מביצה. שניהם \"חלבון\" על התווית, אבל הזמינות הביולוגית שלהם שונה לחלוטין.</p>\n<p><b>מדד DIAAS</b> — זה דירוג החלבון לפי פרופיל חומצות אמינו ויכולת ספיגה אמיתית בגוף. ככל שהמדד גבוה יותר, כך הגוף שלכם מנצל יותר מהחלבון שאכלתם בפועל.</p>\n<p><b>העדיפות בחיטוב</b> — אנחנו מתמקדים במקורות עם ספיגה מקסימלית, כמו חלבון מן החי או אבקות חלבון איכותיות.</p>\n<p>ותזכרו את המשפט הזה: <b>בגירעון קלורי — האיכות היא קריטית לשימור השריר.</b> כשאתם בגירעון, אין לכם מרווח טעות. כל גרם חלבון צריך לעבוד בשבילכם.</p>\n<h2>שקף 4 — השיטה הרגילה מול השיטה שלנו (6:30-8:15)</h2>\n<div class=\"cue\">[שקף: טבלה — ארבעה פרמטרים]</div>\n<p>בואו נראה את זה זה מול זה.</p>\n<p>בספירת חלבון — השיטה הרגילה היא ספירה כמותית כללית. השיטה שלנו — תיעוד לפי איכות ספיגה, לפי DIAAS.</p>\n<p>בבסיס לחישוב — השיטה הרגילה היא משקל גוף מלא. השיטה שלנו — חישוב לפי מסה רזה, LBM.</p>\n<p>במטרה המרכזית — השיטה הרגילה היא ירידה \"בכל מחיר\". השיטה שלנו — שימור כוח ובניית \"פסל\" שרירי.</p>\n<p>ובמיינדסט — השיטה הרגילה שואפת \"להיות קטן יותר\". השיטה שלנו שואפת \"להיות איכותי ומחוטב יותר\".</p>\n<p>זה ההבדל בין דיאטה שגורמת לכם להיראות רזים אבל חלשים, לבין פרוטוקול שגורם לכם להיראות חטובים באמת.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:15-9:45)</h2>\n<div class=\"cue\">[שקף: בדיקה, איכות, הכנה — \"מוכנים לשלב 2\"]</div>\n<p>שלוש משימות.</p>\n<p><b>בדיקה</b> — חשבו את ה-LBM המשוער שלכם לפי הנוסחה שלמדתם היום: משקל × (1 פחות אחוז שומן). לא יודעים אחוז שומן? כתבו לי ונאמוד ביחד.</p>\n<p><b>איכות</b> — בדקו אם מקורות החלבון שלכם היום הם \"High DIAAS\" — ביצים, עוף, חלבון חלב. אם לא — זה הזמן להתחיל להחליף.</p>\n<p><b>הכנה</b> — מחר אנחנו נכנסים ל\"חלק 2\" של הפרוטוקול. מנוע התזונה המעשי — ניהול תקציב אנרגטי.</p>\n<p>אתם מוכנים לשלב 2. נתראה מחר.</p>"},{"t":"יום 6 — ניהול תקציב אנרגטי: הכסף של הגוף","h":"<div class=\"meta\"><b>אורך יעד:</b> 10-12 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 6.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לאכול את מה שאוהבים ועדיין לראות קוביות. קלוריות הן כסף, וכלל ה-80/20 הוא הדרך לגמישות בתוך מסגרת.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"ניהול תקציב אנרגטי — יום 6: הכסף של הגוף\". \"איך לאכול את מה שאוהבים ועדיין לראות קוביות\"]</div>\n<p>יום 6. שישית הימים מאחוריכם. היום אני הולך להראות לכם איך לאכול את מה שאתם אוהבים — ועדיין לראות קוביות בבטן.</p>\n<p>זה נשמע כמו סתירה. זה לא. בואו נבין למה.</p>\n<h2>שקף 2 — קלוריות הן כסף (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: תמונת אפליקציית \"Calorie Bank\" עם יתרה, הכנסות והוצאות. האנלוגיה, ניהול סיכונים, החופש]</div>\n<p><b>האנלוגיה</b> — התקציב הקלורי היומי שלכם הוא כמו חשבון עובר ושב בבנק. יש לכם סכום מסוים לניצול, וזהו.</p>\n<p><b>ניהול סיכונים</b> — אם תבזבזו את כל ה\"כסף\" על שטויות בבוקר, תישארו רעבים — במינוס — בלילה. בדיוק כמו שקורה לבנק אם תוציאו את כל המשכורת ביום הראשון של החודש.</p>\n<p><b>החופש</b> — אבל הנה החלק הכי חשוב: כשאתם יודעים כמה \"כסף\" יש לכם, אתם מחליטים על מה להוציא אותו, ללא רגשות אשם. זו לא הגבלה. זה חופש מודע.</p>\n<p>תסתכלו על התמונה שאני מראה — אפליקציית מעקב עם יתרה נוכחית, הכנסות והוצאות. זה בדיוק איך אני רוצה שתחשבו על הקלוריות שלכם. לא כאיסור. כתקציב.</p>\n<h2>שקף 3 — סדרי עדיפויות בתקציב (3:15-6:00)</h2>\n<div class=\"cue\">[שקף: הוצאות חובה, הוצאות משתנות, כלל הזהב 80/20]</div>\n<p>עכשיו — איך בונים את התקציב הזה בפועל?</p>\n<p><b>הוצאות חובה</b> — החלבון. קודם כל משלמים ל\"שריר\". חלבון איכותי, DIAAS גבוה, כדי לשמור על המבנה שבניתם. זה תמיד המקום הראשון שהתקציב הולך אליו.</p>\n<p><b>הוצאות משתנות</b> — פחמימות ושומן. מה שנשאר בתקציב הולך לאנרגיה ולטעם, לפי העדפה אישית שלכם. כאן יש לכם חופש בחירה.</p>\n<p><b>כלל הזהב, 80/20</b> — 80 אחוז מזון איכותי ומזין, 20 אחוז להנאות קטנות בשביל הנפש וההתמדה. זה לא \"20 אחוז זבל\". זה 20 אחוז מהתקציב שאתם בוחרים להוציא על משהו שאתם באמת נהנים ממנו.</p>\n<h2>דוגמה אישית — איך אני בונה את זה על עצמי (6:00-7:15)</h2>\n<div class=\"cue\">[שקף: ללא — פנייה ישירה למצלמה, אפשר לוח/מחשבון בצד]</div>\n<p>בואו אני אראה לכם את זה על עצמי, כדי שתבינו איך מחברים את כל מה שלמדנו עד עכשיו לתקציב אחד שלם.</p>\n<p>זוכרים את ה-TDEE מיום 4? נגיד שה-TDEE שלי, ההוצאה הקלורית היומית הכוללת שלי, יוצא בערך 2,900 קלוריות. כדי להיות בגירעון בריא לחיטוב, אני יורד ל-2,400 קלוריות ביום בערך — גירעון של כ-500 קלוריות, בדיוק כמו שדיברנו ביום 1.</p>\n<p>עכשיו — <b>הוצאת החובה, החלבון</b>, מה-LBM שלי, יוצאת אצלי בסביבות 180 גרם ביום. 180 גרם חלבון שווים 720 קלוריות — כי כל גרם חלבון הוא 4 קלוריות. זה כבר ירד לי מהתקציב, בלי לגעת בשאר.</p>\n<p>נשארו לי 1,680 קלוריות. את זה אני מחלק בין שומן ופחמימה — נגיד 70 גרם שומן, שזה 630 קלוריות, ואת השאר, בערך 260 גרם, לפחמימות. וזהו — זה כל התקציב שלי, מחולק לגמרי.</p>\n<p>וברגע שיש לי את המספרים האלה — אני יודע בדיוק כמה \"מקום\" יש לי היום. יכול להיות שאני אבחר לאכול פחות פחמימה בארוחת בוקר, כדי שיהיה לי יותר בערב עם החברים. זה בדיוק החופש שדיברנו עליו.</p>\n<h2>שקף 4 — גמישות מול נוקשות (7:15-9:15)</h2>\n<div class=\"cue\">[שקף: השיטה שלנו מול הטעות]</div>\n<p><b>הטעות</b> הכי נפוצה בדיאטות — נוקשות של \"מותר ואסור\". זה מוביל לתחושת חנק, שבירה, וזלילה בלתי נשלטת. אתם מכירים את התבנית — שבועיים \"מושלמים\" ואז יום אחד של קריסה מוחלטת.</p>\n<p><b>השיטה שלנו</b> — ניהול גמיש בתוך מסגרת קשיחה. אוכלים מה שרוצים, כל עוד זה נכנס למסגרת הקלורית ולחלבון. המסגרת קשיחה — היעדים לא זזים. אבל מה שבתוכה — גמיש לחלוטין.</p>\n<p><b>התוצאה</b> — התמדה לאורך זמן, כי אין תחושת חסך. זה ההבדל בין פרוטוקול שאתם יכולים לחיות איתו שנה שלמה, לבין דיאטה שנשברת אחרי שלושה שבועות.</p>\n<h2>שקף 5 — המשימה שלכם להיום (9:15-10:45)</h2>\n<div class=\"cue\">[שקף: מחשבה, תכנון, תיעוד — \"המשמעת של היום היא החופש של מחר\"]</div>\n<p>שלוש משימות.</p>\n<p><b>תיעוד</b> — הזינו מה אכלתם באפליקציית מעקב, או שקלו הכל בהתאם לתפריט שלכם היום. בדקו כמה \"כסף\" נשאר לכם.</p>\n<p><b>תכנון</b> — תכננו מראש את הארוחות למחר, כדי שלא תופתעו ותחרגו מהתקציב.</p>\n<p><b>מחשבה</b> — שאלו את עצמכם: האם הוצאתם את הקלוריות שלכם על מזון משביע, או על קלוריות \"ריקות\"?</p>\n<p>ותזכרו את המשפט הזה: <b>המשמעת של היום היא החופש של מחר.</b> נתראה מחר — נלמד איך לא להיות רעב בחיטוב.</p>"},{"t":"יום 7 — אסטרטגיית \"נפח מזון\"","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 7.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> לאכול יותר, לשקול פחות. צפיפות קלורית, ארגז הכלים של ה-PRO, והפסיכולוגיה של הצלחת.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"אסטרטגיית 'נפח מזון' — יום 7: איך לא להיות רעב בחיטוב\". \"לאכול יותר — לשקול פחות\"]</div>\n<p>יום 7 — סיימנו שבוע ראשון שלם. היום אני נותן לכם את הכלי שהכי משנה לאנשים את החוויה של החיטוב: איך לאכול יותר אוכל, ולשקול פחות קלוריות.</p>\n<p>זה לא קסם. זו פיזיקה של מזון.</p>\n<h2>שקף 2 — צפיפות קלורית: נפח מול אנרגיה (0:45-3:30)</h2>\n<div class=\"cue\">[שקף: השוואה חזותית — קוביית שוקולד מול קערת תותים, שתיהן 100 קלוריות]</div>\n<p><b>העיקרון</b> — היחס בין כמות הקלוריות לבין המשקל והנפח של המזון בצלחת.</p>\n<p>תסתכלו על התמונה: 100 קלוריות של שוקולד מריר — קוביה קטנטנה. ו-100 קלוריות של תותים טריים — קערה ענקית, מלאה עד למעלה.</p>\n<p><b>אותה כמות קלוריות בדיוק. חוויית אכילה שונה לגמרי.</b></p>\n<p>למה זה קורה? <b>מנגנון השובע</b> — הקיבה שלכם מגיבה לנפח ולמתיחה של הדפנות שלה, לא למספר הקלוריות הנכנסות. זו עובדה פיזיולוגית. הקיבה לא יודעת לספור קלוריות — היא יודעת רק להתמלא.</p>\n<h2>שקף 3 — ארגז הכלים של ה-PRO (3:30-6:15)</h2>\n<div class=\"cue\">[שקף: ארבעה כרטיסים — החלפות חכמות, נוזלים, חלבון משביע, ירקות כבסיס]</div>\n<p>ארבעה כלים שאני רוצה שתשלבו מהיום.</p>\n<p><b>ירקות כבסיס</b> — שימוש בירקות ירוקים וסיביים כדי למלא את הצלחת במינימום קלוריות.</p>\n<p><b>חלבון משביע</b> — חלבון הוא אב המזון עם מדד השובע הגבוה ביותר, בזכות TEF גבוה — הוא דורש הכי הרבה אנרגיה לעיכול, וזה תורם לתחושת השובע.</p>\n<p><b>נוזלים</b> — שתיית מים לפני ואחרי ארוחה עוזרת ליצירת תחושת מלאות בקיבה.</p>\n<p><b>החלפות חכמות</b> — מעבר מפחמימות דחוסות, כמו פסטה, לפחמימות בנפח גבוה — תפוח אדמה, פירות.</p>\n<p>תזכרו את המשפט הזה: <b>ארגז הכלים שלכם הוא המפתח לשליטה ברעב ולשיפור הביצועים.</b></p>\n<h2>שקף 4 — הפסיכולוגיה של הצלחת (6:15-8:15)</h2>\n<div class=\"cue\">[שקף: אשליית העין, זמן אכילה וגיוון]</div>\n<p><b>אשליית העין</b> — העדיפו צלחת קטנה ומלאה על פני צלחת גדולה שנראית ריקה. המוח \"אוכל\" קודם כל דרך העיניים, ומתרגם צלחת מלאה לשובע עתידי — עוד לפני שאכלתם ביס.</p>\n<p><b>זמן אכילה וגיוון</b> — למוח לוקח כ-20 דקות לקבל את אות השובע. אז אכלו לאט. וגיוון של מרקמים וצבעים עוזר לתחושת סיפוק נפשי עמוק יותר מהארוחה — לא רק פיזי.</p>\n<h2>שקף 5 — המשימה שלכם היום (8:15-9:45)</h2>\n<div class=\"cue\">[שקף: שדרוג ארוחה, החלפה חכמה, תיעוד ומעקב — \"סיימנו שבוע 1 בהצלחה!\"]</div>\n<p>שלוש משימות.</p>\n<p><b>שדרוג ארוחה</b> — הוסיפו לפחות 200 עד 300 גרם ירקות לארוחה המרכזית שלכם היום.</p>\n<p><b>החלפה חכמה</b> — החליפו פחמימה אחת \"דחוסה\" — לחם או אורז — בירק או פרי בעל נפח גבוה.</p>\n<p><b>תיעוד ומעקב</b> — שימו לב איך השינוי בנפח השפיע על רמת הרעב שלכם היום.</p>\n<p>וזה המקום לעצור רגע — <b>סיימנו שבוע 1 בהצלחה.</b> אתם עכשיו יודעים לחשב את הפיזיקה, לנהל את הדאטה, לבנות סביבה תומכת, להבין TDEE ו-NEAT, לחשב LBM ו-DIAAS, לנהל תקציב קלורי, ולנצל צפיפות קלורית. זה יסוד עצום. מחר נדבר על הנושא שהכי מפיל אנשים — חשקים. נתראה מחר.</p>"},{"t":"יום 8 — ניהול חשקים (Cravings)","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 8.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לנצח את הדחף למתוק בלי לשבור את הכלים. חשק הוא גל — הוא עולה, מגיע לשיא, ודועך.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"ניהול חשקים — יום 8: המדריך להישרדות\". \"איך לנצח את הדחף למתוק בלי לשבור את הכלים\"]</div>\n<p>יום 8. היום אני נוגע בנושא שכולם חווים, ורוב האנשים לא יודעים איך להתמודד איתו נכון — חשקים.</p>\n<h2>שקף 2 — רעב פיזיולוגי מול רעב רגשי (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: תמונת ChatGPT ומוח מסומן עם סימן אזהרה. רעב פיזי, החשק, ההבנה]</div>\n<p><b>רעב פיזי</b> — מגיע בהדרגה, מורגש בבטן, ועובר עם כל סוג של אוכל מזין. אם אתם רעבים באמת, עוף וירקות ישביע אתכם בדיוק כמו עוגה.</p>\n<p><b>החשק, ה-Craving</b> — מגיע בפתאומיות, מתמקד במאכל ספציפי, ויושב ב\"ראש\", לא בבטן. פתאום אתם \"חייבים\" דווקא שוקולד, ודווקא עכשיו.</p>\n<p><b>ההבנה הקריטית</b> — חשק הוא כמו גל. הוא עולה, מגיע לשיא, ואז דועך — אם לא מזינים אותו. זה לא מצב קבוע. זה אירוע זמני שיש לו תחילה, שיא, וסוף.</p>\n<h2>שקף 3 — טכניקת 10 הדקות (3:15-5:30)</h2>\n<div class=\"cue\">[שקף: מעגל \"10 דקות של שקט\". השהיה, הסחת דעת, תוצאה]</div>\n<p>הכלי המעשי שאני נותן לכם: <b>טכניקת 10 הדקות.</b></p>\n<p><b>השהיה</b> — כשעולה דחף עז למתוק, חכו 10 דקות לפני שאתם פועלים. לא \"אף פעם לא\". רק 10 דקות.</p>\n<p><b>הסחת דעת</b> — שתו כוס מים גדולה, או צאו להליכה קצרה. וכן, זה קשור ל-NEAT שדיברנו עליו ביום 4.</p>\n<p><b>התוצאה</b> — עוצמת הדחף תרד משמעותית, ותוכלו לקבל החלטה רציונלית, לא רגשית.</p>\n<p>זה עובד כי הגל של החשק לא נשאר בעוצמה מקסימלית לנצח. הוא יורד. אתם רק צריכים לתת לו את הזמן לרדת.</p>\n<h2>שקף 4 — שילוב ה-20 אחוז בתקציב (5:30-7:45)</h2>\n<div class=\"cue\">[שקף: מיינדסט, שליטה, מניעה מראש]</div>\n<p><b>מיינדסט</b> — אין \"אוכל אסור\", יש רק \"אוכל שלא נמצא בתקציב כרגע\". הכל בניהול, כמו שדיברנו ביום 6.</p>\n<p><b>שליטה</b> — אכלו את הפינוק בסוף ארוחה משביעה, כשהשובע גבוה, ולא על בטן ריקה. זה משנה לחלוטין את הכמות שתאכלו.</p>\n<p><b>מניעה מראש</b> — שלבו פינוק קטן בתוך התקציב היומי, לפי כלל ה-80/20, כדי למנוע \"פיצוץ\" רגשי בהמשך היום.</p>\n<h2>שקף 5 — המשימה שלכם היום (7:45-9:15)</h2>\n<div class=\"cue\">[שקף: זיהוי, יישום, תכנון — \"לנצח את הדחף!\"]</div>\n<p>שלוש משימות.</p>\n<p><b>זיהוי</b> — כשעולה חשק, שימו לב מה הייתה הסיטואציה. סטרס? עייפות? שעמום? אין צורך לרשום את זה איפשהו — רק להיות מודעים לרגע עצמו.</p>\n<p><b>יישום</b> — השתמשו בטכניקת 10 הדקות לפחות פעם אחת היום.</p>\n<p><b>תכנון</b> — בחרו פינוק אחד קטן, והכניסו אותו לתקציב של מחר, מראש.</p>\n<p>לנצח את הדחף! מחר עוברים לנושא האימונים — איך לשמור על הברזל בזמן חיטוב. נתראה מחר.</p>"},{"t":"יום 9 — אסטרטגיית אימונים: לשמור על הברזל","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 9.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> שריר שבנית בכבדות — תשמור עליו בכבדות. האימון בחיטוב הוא לא כלי לשריפת קלוריות, הוא הסימן שאומר לגוף לא לפרק שריר.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"אסטרטגיית אימונים — יום 9: לשמור על הברזל\". \"שריר שבנית בכבדות — תשמור עליו בכבדות\"]</div>\n<p>יום 9. שני שלישים מהפרוטוקול מאחוריכם. היום אנחנו חוזרים לחדר כושר — אבל בזווית שרוב האנשים לא מבינים נכון.</p>\n<h2>שקף 2 — תפקיד האימון בחיטוב (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: לא רק שריפת קלוריות, שימור מסה, עצימות גבוהה]</div>\n<p><b>לא רק שריפת קלוריות</b> — האימון הוא לא הכלי המרכזי לשריפת אנרגיה. זכרו — הוא רק 5 אחוז מה-TDEE שלכם, מיום 4. הוא כלי לדבר אחר, קריטי לא פחות: סימן קריטי לגוף לשמור על השריר הקיים.</p>\n<p><b>שימור מסה, LBM</b> — המטרה היא לתת לגוף סיבה פיזיולוגית לא לפרק את רקמת השריר היקרה, בזמן שהוא נמצא בגירעון קלורי. הגוף שלכם, כשהוא במחסור באנרגיה, מחפש מקורות אנרגיה — וגם שריר וגם שומן הם מועמדים. האימון הוא מה שאומר לגוף: \"אל תיגע בשריר הזה, אני עדיין צריך אותו.\"</p>\n<p><b>עצימות גבוהה</b> — ממשיכים לעבוד קרוב לכשל, כדי לשמר את יכולת הגיוס העצבית של השריר.</p>\n<h2>שקף 3 — המיתוס של \"חזרות גבוהות\" (3:15-5:45)</h2>\n<div class=\"cue\">[שקף: שלושה כרטיסים — השיטה שלנו, הסכנה, טעות נפוצה]</div>\n<p><b>הטעות הנפוצה</b> — מעבר למשקלים קלים ו-20 פלוס חזרות, כדי \"לחטב\" את השריר. אנשים חושבים שחזרות גבוהות \"מגדירות\" שריר. זו טעות מכנית מוחלטת.</p>\n<p><b>הסכנה</b> — הורדת עומס גורמת לגוף להבין שהוא לא זקוק למסה הזו — מה שמוביל לאיבוד שריר בדיוק כשאתם הכי צריכים לשמור עליו.</p>\n<p><b>השיטה שלנו</b> — שמירה על טווחי חזרות של 6 עד 12, עם משקלים מאתגרים וכבדים. זה מה שנשאר קבוע, לא משנה כמה עמוק הגירעון.</p>\n<h2>שקף 4 — ניהול התאוששות בגירעון (5:45-8:00)</h2>\n<div class=\"cue\">[שקף: נפח מול עצימות, הקשבה לגוף, שינה איכותית]</div>\n<p><b>נפח מול עצימות</b> — עדיף להוריד מעט את מספר הסטים הכללי, הנפח, אך לשמור על משקלי העבודה — העצימות.</p>\n<p><b>הקשבה לגוף</b> — ככל שהגירעון עמוק יותר, ההתאוששות איטית יותר. שימו לב לכאבי מפרקים, או לעייפות כרונית — אלה סימנים שהעומס גדול מדי לכם כרגע.</p>\n<p><b>שינה איכותית</b> — הכלי הכי חזק שלכם להתאוששות ולשמירה על רמות הורמונליות תקינות. נדבר על זה בהרחבה מחר.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:00-9:30)</h2>\n<div class=\"cue\">[שקף: תיעוד ב-Sheets, יעד האימון הבא, מעקב כוח — \"100% שימור משקלי עבודה\"]</div>\n<p>שלוש משימות.</p>\n<p><b>תיעוד ב-Sheets</b> — רשמו את משקלי העבודה שלכם בתרגילי הליבה המרכזיים — סקוואט, לחיצה, גב.</p>\n<p><b>יעד האימון הבא</b> — השאיפה היא לשמור על אותם משקלים בדיוק, או לעלות אם אפשר.</p>\n<p><b>מעקב כוח</b> — ירידה חריגה בכוח היא סימן שהגירעון שלכם אגרסיבי מדי. אם זה קורה — כתבו לי, נדבר על זה.</p>\n<p>המטרה: 100 אחוז שימור משקלי עבודה. נתראה מחר — נדבר על סטרס ושינה, והסוד למראה ה\"יבש\".</p>"},{"t":"יום 10 — ניהול סטרס ושינה","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 10.pdf (5 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> הסוד למראה ה\"יבש\". למה הבטן שלכם מסתירה את הקוביות תחת נוזלים — וקורטיזול הוא האשם.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"ניהול סטרס ושינה — יום 10: הסוד למראה 'יבש'\". \"למה הבטן שלכם מסתירה את הקוביות תחת נוזלים?\"]</div>\n<p>יום 10 — סדרת ה-PRO. היום אני נוגע בנושא שמעטים מקשרים לחיטוב, אבל הוא אחד המשפיעים ביותר: סטרס ושינה.</p>\n<h2>שקף 2 — קורטיזול, הורמון הסטרס (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: שלושה כרטיסים — רעב מוגבר, פירוק שריר, אצירת נוזלים]</div>\n<p><b>רעב מוגבר</b> — הורמון הסטרס משבש את תחושת השובע, ומעלה את החשק העז לפחמימות ושומנים. זה לא חולשת אופי — זה קורטיזול פועל על המוח שלכם.</p>\n<p><b>פירוק שריר</b> — סטרס כרוני מעודד תהליכים קטבוליים שפוגעים במסת השריר, ה-LBM, שבניתם. בדיוק ה-LBM שאנחנו עובדים כל כך קשה לשמר.</p>\n<p><b>אצירת נוזלים</b> — רמות גבוהות של קורטיזול גורמות לגוף לאגור מים תחת העור — מה שיוצר מראה \"מטושטש\" ורך, גם אם השומן שלכם ירד.</p>\n<p>זה בדיוק מה שקורה כשמישהו עושה הכל נכון בתזונה, אבל ישן חמש שעות בלילה ובלחץ מתמיד — והמראה לא משתפר בהתאם למאמץ.</p>\n<h2>שקף 3 — שינה ככלי לחיטוב (3:15-5:45)</h2>\n<div class=\"cue\">[שקף: ויסות הורמונלי, שליטה בדחפים, המלצת ה-PRO]</div>\n<p><b>ויסות הורמונלי</b> — בשינה עמוקה מופרש הורמון הגדילה, GH, האחראי על שיקום שריר ושריפת שומן. זה קורה בשלבי השינה העמוקים ביותר.</p>\n<p><b>שליטה בדחפים</b> — מחסור בשינה מחליש את כוח הרצון, והופך את ניהול ה-Cravings, שדיברנו עליהם אתמול, לבלתי אפשרי כמעט.</p>\n<p><b>המלצת ה-PRO</b> — שאפו ל-7 עד 9 שעות שינה איכותיות בלילה, כדי למקסם את תוצאות החיטוב.</p>\n<h2>שקף 4 — כלים להורדת סטרס (5:45-8:00)</h2>\n<div class=\"cue\">[שקף: שלושה כלים — נשימות, NEAT מרגיע, ניתוק דיגיטלי]</div>\n<p><b>ניתוק דיגיטלי</b> — שעה לפני השינה, בלי מסכים כחולים שמשבשים את הפרשת המלטונין.</p>\n<p><b>NEAT מרגיע</b> — הליכה קלה בחוץ היא הדרך הטובה ביותר להוריד רמות קורטיזול באופן טבעי.</p>\n<p><b>נשימות</b> — תרגול של 5 דקות נשימות עמוקות מעביר אתכם ממצב \"לחימה\" למצב \"מנוחה\" — מהמערכת הסימפתטית לפרה-סימפתטית.</p>\n<h2>שקף 5 — המשימה שלכם היום (8:00-9:30)</h2>\n<div class=\"cue\">[שקף: קביעת שעת כניסה, שגרת לילה חדשה, תיעוד ב-Sheets — יעד 7-9 שעות]</div>\n<p>שלוש משימות.</p>\n<p><b>קביעת שעת כניסה</b> — קבעו שעה קבועה למיטה הלילה, כך שיהיו לכם לפחות 7 שעות עד הקימה.</p>\n<p><b>שגרת לילה חדשה</b> — נתקו את הטלפון שעה לפני השינה, והחליפו אותו בספר או בנשימות.</p>\n<p><b>תיעוד ב-Sheets</b> — המשקל שתזינו מחר בבוקר יספר לכם את הסיפור — שינה טובה הלילה תיראה בממוצע השבועי.</p>\n<p>הלילה אנחנו מתחילים לשרוף שומן באמת. נתראה מחר — נלמד איך לאכול יותר פחמימות ולצאת חטובים יותר, עם אסטרטגיית ה-Refeed.</p>"},{"t":"יום 11 — אסטרטגיית ה-Refeed","h":"<div class=\"meta\"><b>אורך יעד:</b> 10-12 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 11.pdf (7 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לאכול יותר פחמימות ולצאת חטובים יותר. Refeed הוא מהלך מחושב, לא צ'יט.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"יום 11 — אסטרטגיית ה-Refeed\". \"איך לאכול יותר פחמימות ולצאת חטובים יותר\"]</div>\n<p>יום 11. היום, בפעם הראשונה בפרוטוקול, אני אומר לכם לאכול יותר. לא כי אתם \"מגיעים לכם\". כי זה אסטרטגיה.</p>\n<h2>שקף 2 — לתדלק את המנוע (0:45-1:45)</h2>\n<div class=\"cue\">[שקף: \"לתדלק את המנוע\"]</div>\n<p>היום אנחנו לומדים איך להשתמש באוכל ככלי אסטרטגי לשיפור המראה והביצועים. זה לא הפסקה מהפרוטוקול — זה חלק אינטגרלי ממנו.</p>\n<h2>שקף 3 — מה זה בכלל Refeed? (1:45-4:30)</h2>\n<div class=\"cue\">[שקף: ההבדל מהצ'יט. שלושה כרטיסים — הורמון הלפטין, שיפור ביצועים, הורדת סטרס]</div>\n<p><b>ההבדל מהצ'יט</b> — זהו מהלך מחושב שנכנס לתוך התקציב. לא זלילה חסרת רסן. זה ההבדל המהותי — יום Refeed הוא מתוכנן מראש, עם מספרים מדויקים.</p>\n<p>עכשיו, שלושה יתרונות פיזיולוגיים אמיתיים:</p>\n<p><b>הורמון הלפטין</b> — איתות למוח שהגוף לא ב\"רעב\", מה שמעלה את קצב חילוף החומרים מחדש. אחרי ימים רבים בגירעון, הלפטין יורד, והגוף נכנס למצב חיסכון. Refeed מאותת למוח שהכל בסדר.</p>\n<p><b>שיפור ביצועים</b> — מילוי המאגרים מאפשר אימון עוצמתי ואיכותי הרבה יותר ביום למחרת.</p>\n<p><b>הורדת סטרס</b> — הורדת רמות קורטיזול, ושחרור נוזלים מיותרים שהצטברו בגלל הגירעון המתמשך.</p>\n<h2>שקף 4 — איך עושים את זה נכון (4:30-6:45)</h2>\n<div class=\"cue\">[שקף: פוקוס על פחמימות, צמצום שומן, בקרה מלאה]</div>\n<p><b>פוקוס על פחמימות</b> — מעלים אורז, תפוח אדמה או פסטה, תוך שמירה על חלבון גבוה. החלבון לא זז ביום ה-Refeed.</p>\n<p><b>צמצום שומן</b> — נשמור על רמת שומן נמוכה במיוחד, כדי שהקלוריות הנוספות ילכו לשריר ולא לאגירה. זה ההבדל בין Refeed חכם לצ'יט מיל.</p>\n<p><b>בקרה מלאה</b> — אנחנו לא מנחשים, אנחנו מתדלקים בחוכמה. ותראו את התוצאה בממוצע השבועי ב-Sheets — Refeed נכון לא מאט את המגמה, לפעמים אפילו מזרז אותה.</p>\n<h2>שקף 5 — השפעת ה-Refeed על מאגרי השריר (6:45-8:30)</h2>\n<div class=\"cue\">[שקף: גרף — 30% גירעון מתמשך, 85% אחרי ארוחות Refeed, 100% פוטנציאל אימון פוסט-Refeed]</div>\n<p>תסתכלו על הגרף שאני מראה לכם. הנתונים האלה מראים את רמת המלאות התאית ויכולת ייצור הכוח בשריר.</p>\n<p>בגירעון מתמשך — ריקון — אתם נמצאים בסביבות 30 אחוז מהמלאות. אחרי ארוחות Refeed — אתם קופצים ל-85 אחוז. ואימון שמתבצע אחרי Refeed — מגיע לפוטנציאל של 100 אחוז.</p>\n<p>זו הסיבה שאני ממליץ לתזמן את יום ה-Refeed לפני האימון הכי כבד שלכם בשבוע.</p>\n<h2>שקף 6 — המשימה שלכם להיום (8:30-10:00)</h2>\n<div class=\"cue\">[שקף: תכנון, בחירת מקורות, מעקב]</div>\n<p>שלוש משימות.</p>\n<p><b>תכנון</b> — חשבו את תוספת הפחמימות ליום ה-Refeed, בדרך כלל מחר או בסופ\"ש.</p>\n<p><b>בחירת מקורות</b> — בחרו שני מקורות פחמימה איכותיים שאתם אוהבים, ושלבו אותם בתפריט.</p>\n<p><b>מעקב</b> — שימו לב לשינוי במראה השריר, המלאות, ובאנרגיה באימון ביום שאחרי.</p>\n<h2>שקף 7 — סגירה (10:00-10:30)</h2>\n<div class=\"cue\">[שקף: \"אני כאן כדי לוודא שאתם מתדלקים נכון ומגיעים לתוצאות שיא\"]</div>\n<p>אני כאן כדי לוודא שאתם מתדלקים נכון, ומגיעים לתוצאות שיא. אם יש לכם שאלות על ה-Refeed — תכתבו לי. ניפגש ביום 12, נדבר על חיים חברתיים בחיטוב.</p>"},{"t":"יום 12 — חיים חברתיים בחיטוב: המדריך למסעדות","h":"<div class=\"meta\"><b>אורך יעד:</b> 10-13 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 12.pdf (8 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לצאת לבלות בלי לחזור עם \"קנס\" במשקל. Pre-Game, בחירות חכמות, וחוק ה-3 ביסים.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"חיים חברתיים בחיטוב: המדריך למסעדות\". \"איך לצאת לבלות בלי לחזור עם 'קנס' במשקל\"]</div>\n<p>יום 12. חיטוב לא אומר לוותר על חיי חברה. היום אני נותן לכם את המדריך המלא לצאת, ליהנות, ולהישאר בתוך התקציב.</p>\n<h2>שקף 2 — להיות ה-PRO בשולחן (0:45-1:30)</h2>\n<div class=\"cue\">[שקף: \"להיות ה-PRO בשולחן\"]</div>\n<p>השיעור הזה נלמד איך לשלב הנאה חברתית עם משמעת עצמית של מקצוענים. אלה לא סותרים זה את זה.</p>\n<h2>שקף 3 — אסטרטגיית ה-Pre-Game (1:30-4:00)</h2>\n<div class=\"cue\">[שקף: תמונת אדם עם תפריט. חיסכון ב\"כסף\", לא להגיע מורעבים, בדיקת תפריט]</div>\n<p><b>חיסכון ב\"כסף\"</b> — ביום של אירוע, נשמור על תקציב קלורי נמוך במהלך היום, בעיקר חלבון וירקות. זה נותן לכם \"מקום\" לאירוע בערב.</p>\n<p><b>לא להגיע מורעבים</b> — אכלו ארוחת חלבון קטנה, יוגורט או שייק, שעה לפני היציאה, כדי לשמור על שליטה. אף אחד לא מקבל החלטות טובות כשהוא רעב במסעדה.</p>\n<p><b>בדיקת תפריט</b> — הסתכלו בתפריט המסעדה מראש, והחליטו מה אתם מזמינים עוד לפני שהתיישבתם. ברגע שאתם יושבים עם התפריט מול העיניים, קשה הרבה יותר לבחור נכון.</p>\n<h2>שקף 4 — בחירות חכמות בשטח (4:00-6:30)</h2>\n<div class=\"cue\">[שקף: צלחת סטייק עם רוטב בצד. החלבון הוא העוגן, מלכודת הרטבים, שתייה]</div>\n<p><b>החלבון הוא העוגן</b> — העדיפו תמיד נתח חלבון נקי — חזה עוף, סינטה, דג בתנור — כבסיס לארוחה.</p>\n<p><b>מלכודת הרטבים</b> — בקשו את הרוטב בצד. רטבים הם המקור הסמוי הכי גדול לקלוריות מיותרות במסעדות. אתם שולטים בכמות כשהוא בצד, לא כשהוא כבר על האוכל.</p>\n<p><b>שתייה</b> — העדיפו מים, משקאות דיאט או סודה. אל תבזבזו את התקציב שלכם על קלוריות נוזליות.</p>\n<h2>שקף 5 — מיינדסט ה-PRO באירועים (6:30-8:15)</h2>\n<div class=\"cue\">[שקף: חוק ה-3 ביסים, מיקוד חברתי]</div>\n<p><b>חוק ה-3 ביסים</b> — רוצים לטעום מהקינוח? קחו שלושה ביסים קטנים ותיהנו מהטעם, בלי לחסל את כל המנה.</p>\n<p><b>מיקוד חברתי</b> — זכרו שהיציאה היא בשביל האנשים והחברה. האוכל הוא רק הליווי. תהיו נוכחים בשיחה, לא רק בצלחת.</p>\n<h2>שקף 6 — חרגתם מעט? לא קרה כלום (8:15-9:15)</h2>\n<div class=\"cue\">[שקף: \"פשוט חוזרים לתפריט הרגיל בארוחה הבאה\"]</div>\n<p>וזה חשוב לא פחות מכל הכללים — חרגתם מעט? לא קרה כלום. פשוט חוזרים לתפריט הרגיל בארוחה הבאה.</p>\n<p>שחרור מרגשות אשם הוא המפתח להתמדה לאורך זמן. נדבר על זה עוד בהרחבה ביום 14.</p>\n<h2>שקף 7 — המשימה שלכם להיום (9:15-10:30)</h2>\n<div class=\"cue\">[שקף: תכנון, יישום, תיעוד]</div>\n<p>שלוש משימות.</p>\n<p><b>תכנון</b> — בחרו יציאה אחת מתוכננת לשבוע הקרוב, ותכננו מראש את ה\"תקציב\" הקלורי עבורה.</p>\n<p><b>יישום</b> — תרגלו הזמנת רוטב בצד, או ויתור על הפחמימה לטובת ירקות, בארוחה הבאה מחוץ לבית.</p>\n<p><b>תיעוד</b> — חשבו רגע — האם שלטתם בסיטואציה?</p>\n<h2>שקף 8 — סגירה (10:30-11:00)</h2>\n<div class=\"cue\">[שקף: \"חיטוב זה לא מאסר, זה ניהול משאבים חכם\"]</div>\n<p>תזכרו — חיטוב זה לא מאסר, זה ניהול משאבים חכם. המשך יום חזק! נתראה ביום 13 — נדבר על אסטרטגיית היציאה מהפרוטוקול.</p>"},{"t":"יום 13 — אסטרטגיית היציאה: לשמור על ההישג","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 13.pdf (6 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לא לעלות הכל חזרה ביום ה-16. Reverse Dieting, ושינוי זהות מ\"בדיאטה\" ל\"מתאמן\".</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"היום שאחרי הפרוטוקול — אסטרטגיית היציאה: לשמור על ההישג\". \"איך לא לעלות הכל חזרה ביום ה-16\"]</div>\n<p>יום 13. אנחנו כבר כמעט בסוף. והיום אני נותן לכם את המידע שהכי מעט מדברים עליו, וזה בדיוק מה שגורם לרוב האנשים לאבד את התוצאה שלהם תוך שבועות מסיום פרוטוקול.</p>\n<h2>שקף 2 — מלכודת הריבאונד (0:45-3:15)</h2>\n<div class=\"cue\">[שקף: מדרגות מוארות עולות. הסכנה מול הפתרון]</div>\n<p><b>הסכנה</b> — סיום הפרוטוקול וחזרה מיידית להרגלים הישנים, ולאכילה חסרת רסן.</p>\n<p><b>התוצאה</b> — עלייה מהירה במשקל, אצירת נוזלים חריפה, ותחושת כישלון מנטלי. זה בדיוק התרחיש שאני רוצה שתמנעו.</p>\n<p><b>הפתרון: \"חיטוב הפוך\", Reverse Dieting</b> — העלאה הדרגתית של הקלוריות, כדי לשמר את חילוף החומרים.</p>\n<h2>שקף 3 — בניית ה-Maintenance, תחזוקה (3:15-5:30)</h2>\n<div class=\"cue\">[שקף: גרף עלייה הדרגתית — סיום אתגר, שבוע 1, שבוע 2, שבוע 3, תחזוקה מלאה, 800 פלוס קק\"ל]</div>\n<p>תסתכלו על הגרף שאני מראה לכם. זה בדיוק איך נראית העלייה הנכונה בקלוריות אחרי הפרוטוקול.</p>\n<p><b>הדרגתיות</b> — הוספת 150 עד 250 קלוריות בכל שבוע, עד לנקודת האיזון החדשה שלכם.</p>\n<p>לא קפיצה של 800 קלוריות ביום אחד. עלייה מדורגת, שבוע אחרי שבוע, שנותנת לגוף שלכם זמן להסתגל בלי לאגור נוזלים בכמויות גדולות ובלי לזרז אחסון שומן.</p>\n<h2>שקף 4 — שינוי זהות: מ\"בדיאטה\" ל\"מתאמן\" (5:30-7:45)</h2>\n<div class=\"cue\">[שקף: חופש אמיתי, הרגלים מנצחים, מיינדסט]</div>\n<p><b>מיינדסט</b> — הפרוטוקול היה רק הסטארטר. עכשיו מתחילה הדרך האמיתית — כאורח חיים קבוע.</p>\n<p><b>הרגלים מנצחים</b> — ממשיכים עם ה-NEAT, עם צריכת החלבון הגבוהה, ועם המעקב ב-Sheets. אלה לא \"כלים לחיטוב\". אלה כלים לחיים.</p>\n<p><b>חופש אמיתי</b> — היכולת לאכול יותר ולהיראות מדהים כל השנה, לא רק בקיץ. זה מה שמחכה לכם בצד השני של ה-Reverse Dieting — לא הגבלה, אלא יותר קלוריות ואותה תוצאה.</p>\n<h2>שקף 5 — המשימה שלכם להיום (7:45-9:00)</h2>\n<div class=\"cue\">[שקף: חישוב, התחייבות, מבט קדימה]</div>\n<p>שלוש משימות.</p>\n<p><b>חישוב</b> — חשבו מהן קלוריות התחזוקה, ה-Maintenance, המשוערות שלכם — היעד הקלורי הנוכחי שלכם, פלוס 150 עד 250.</p>\n<p><b>התחייבות</b> — רשמו שני הרגלים מהפרוטוקול שאתם ממשיכים איתם לנצח.</p>\n<p><b>מבט קדימה</b> — מחר נלמד איך להתמודד עם משברים, ואיך לא להישבר בדרך.</p>\n<h2>שקף 6 — סגירה (9:00-9:30)</h2>\n<div class=\"cue\">[שקף: \"סיום האתגר הוא רק תחילת הגרסה החדשה שלכם\"]</div>\n<p>סיום הפרוטוקול הוא רק תחילת הגרסה החדשה שלכם. הכוח בידיים שלכם. נתראה מחר.</p>"},{"t":"יום 14 — ניהול משברים: כמעט בקו הסיום","h":"<div class=\"meta\"><b>אורך יעד:</b> 9-11 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 14.pdf (6 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> איך לא להישבר בקו הסיום. ההבדל בין \"מעידה\" ל\"נפילה\" — ואנלוגיית הפנצ'ר.</div>\n<h2>שקף 1 — פתיחה (0:00-0:45)</h2>\n<div class=\"cue\">[שקף: כותרת \"כמעט בקו הסיום — יום 14: ניהול משברים\". \"איך לא להישבר בקו הסיום: ההבדל בין 'מעידה' לבין 'נפילה'\"]</div>\n<p>יום 14. יום אחד לפני הסיום. והיום אני נותן לכם את הכלי המנטלי הכי חשוב בכל הפרוטוקול — ואולי בכל מסע כושר שתעברו בחיים.</p>\n<h2>שקף 2 — חוק ה\"הכל או כלום\" — האויב (0:45-3:30)</h2>\n<div class=\"cue\">[שקף: שני כרטיסים — אנלוגיית הפנצ'ר מול הטעות הנפוצה. התיקון]</div>\n<p><b>הטעות הנפוצה</b> — לחשוב שחריגה קטנה בצהריים \"הרסה את כל היום\", ואז להמשיך בזלילה חסרת רסן עד הלילה, כדי \"להתחיל מחדש מחר\".</p>\n<p><b>אנלוגיית הפנצ'ר</b> — אם יש לכם פנצ'ר בגלגל אחד, אתם לא תצאו מהרכב ותנקבו את שאר שלושת הגלגלים, נכון? אל תעשו את זה לתהליך שלכם. פנצ'ר אחד לא הופך רכב תקין לגרוטאה — אלא אם אתם מחליטים לנקב את שאר הגלגלים בעצמכם.</p>\n<p><b>התיקון</b> — חרגתם? חוזרים למסלול כבר בארוחה הבאה. בלי עונשים, בלי צומות, ובלי רגשות אשם.</p>\n<h2>שקף 3 — ניהול עייפות ושחיקה (3:30-6:00)</h2>\n<div class=\"cue\">[שקף: זיהוי המצב, הכלי הטיפולי, משמעת כשריר]</div>\n<p><b>זיהוי המצב</b> — ביום 14 הגוף כבר עייף מהגירעון, והמוח מחפש דופמין מהיר — סוכר ופחמימות. זו לא חולשה שלכם. זה בדיוק הרגע שהפרוטוקול נועד להכין אתכם אליו.</p>\n<p><b>הכלי הטיפולי</b> — השתמשו בשינה איכותית וב-NEAT קל, הליכה, כדי להוריד סטרס במקום באוכל.</p>\n<p><b>משמעת כשריר</b> — המשמעת העצמית שלכם היא שריר. היא הכי חזקה ומשמעותית כשהיא מופעלת ברגעי הקושי, לא ברגעים הקלים.</p>\n<h2>שקף 4 — איך חוזרים למסלול תוך 5 דקות (6:00-8:00)</h2>\n<div class=\"cue\">[שקף: תנועה, דאטה, שתייה]</div>\n<p><b>תנועה</b> — צאו ל-10 דקות הליכה. זה \"מאפס\" את המערכת, ומחזיר אתכם למיינדסט של PRO.</p>\n<p><b>דאטה</b> — רשמו לעצמכם מה גרם לחריגה — סטרס? רעב? אירוע? — כדי ללמוד ולמנוע את הפעם הבאה.</p>\n<p><b>שתייה</b> — שתו שתי כוסות מים גדולות. לעיתים המוח מפרש צמא כרעב, או כצורך במתוק.</p>\n<h2>שקף 5 — המשימה שלכם להיום (8:00-9:15)</h2>\n<div class=\"cue\">[שקף: תכנון סיום, רפלקציה, הכנה לניצחון]</div>\n<p>שלוש משימות.</p>\n<p><b>תכנון סיום</b> — ודאו שהכל מוכן ליום האחרון של הפרוטוקול מחר — הארוחות, האימון, ומדידת הסיכום ב-Sheets.</p>\n<p><b>רפלקציה</b> — רשמו מה היה הרגע הכי קשה לכם ב-14 הימים האחרונים, ואיך הצלחתם לנצח אותו.</p>\n<p><b>הכנה לניצחון</b> — מחר אנחנו מסכמים הכל, מודדים תוצאות, וחוגגים את ההתמדה שלכם.</p>\n<h2>שקף 6 — סגירה (9:15-9:45)</h2>\n<div class=\"cue\">[שקף: \"הקושי הוא זמני, הגאווה בתוצאה היא נצחית\"]</div>\n<p>הקושי הוא זמני. הגאווה בתוצאה היא נצחית. ניפגש מחר, ליום ה-15 והאחרון!</p>"},{"t":"יום 15 — קבלו את הגרסה החדשה שלכם","h":"<div class=\"meta\"><b>אורך יעד:</b> 10-13 דקות</div>\n<div class=\"meta\"><b>מצגת:</b> פרוטוקול הקיץ - יום 15.pdf (7 שקפים)</div>\n<div class=\"meta\"><b>מסר מרכזי:</b> הפרוטוקול הושלם. זה לא הסוף, זו רק ההתחלה החדשה שלכם.</div>\n<h2>שקף 1 — פתיחה (0:00-1:00)</h2>\n<div class=\"cue\">[שקף: כותרת \"קבלו את הגרסה החדשה שלכם — הניצחון שלכם: הפרוטוקול הושלם\". \"זה לא הסוף, זו רק ההתחלה החדשה שלכם\"]</div>\n<p>יום 15. הגעתם.</p>\n<p>לפני שנתחיל למדוד ולסכם — עצרו שנייה ותפנימו את זה: 15 יום ברצף, מבוססי מדע, לא ניחושים. רוב האנשים שמתחילים תהליך כזה לא מגיעים לסוף. אתם הגעתם. וזה אומר עליכם משהו.</p>\n<h2>שקף 2 — המספרים מדברים (1:00-2:00)</h2>\n<div class=\"cue\">[שקף: \"המספרים מדברים\"]</div>\n<p>זמן להסתכל לדאטה בעיניים, ולחגוג את השינוי הפיזיולוגי שעשיתם.</p>\n<h2>שקף 3 — סיכום התוצאות הסופי (2:00-4:30)</h2>\n<div class=\"cue\">[שקף: טבלה — שבוע 1 מול שבוע 2, שלושה מדדים]</div>\n<p>תפתחו את ה-Sheets שלכם עכשיו, ובואו נעבור על שלושה מדדים.</p>\n<p><b>ממוצע משקל שבועי</b> — משבוע 1, נתוני בסיס, לשבוע 2 — ירידה בממוצע, סימן לחיטוב אמיתי.</p>\n<p><b>היקף מותניים</b> — מנקודת הפתיחה, לצמצום בהיקפים — שריפת שומן אמיתית.</p>\n<p><b>ביצועים, משקלי עבודה</b> — מיכולת ייצור כוח בסיסית, לשמירה על כוח, שאומרת שמרתם על שריר.</p>\n<p><b>היקף המותניים הוא המדד האמיתי לשומן ששרפתם בתהליך. המספרים ב-Sheets לא משקרים.</b></p>\n<h2>שקף 4 — מה למדנו ב-15 ימים? (4:30-6:30)</h2>\n<div class=\"cue\">[שקף: ארבעה כרטיסים — שליטה, איכות, סביבה, עצמאות]</div>\n<p><b>שליטה</b> — למדתם לנהל את האוכל כתקציב קלורי מחושב, ולא כצורך רגשי.</p>\n<p><b>איכות</b> — אתם יודעים לבחור חלבון לפי ספיגה, DIAAS, ולא רק לפי טעם.</p>\n<p><b>סביבה</b> — בניתם מטבח ומיינדסט של מקצוענים, שחסינים לפיתויים חיצוניים.</p>\n<p><b>עצמאות</b> — יש לכם את הכלים לעשות את זה לבד, בלי תלות בתפריט קשיח שמישהו אחר בנה לכם.</p>\n<p>זה בדיוק ההבדל בין מי שעושה עוד דיאטה, לבין מי שרוכש מיומנות לכל החיים.</p>\n<h2>שקף 5 — הצעד הבא: הפרוטוקול המלא (6:30-9:00)</h2>\n<div class=\"cue\">[שקף: התאמה אישית, הקהילה, תוצאות קבועות]</div>\n<p>ה-15 יום האלה היו ה\"טירונות\". עכשיו הזמן לעבור לליגה של הגדולים.</p>\n<p><b>התאמה אישית</b> — בניית תוכנית ספציפית ל-LBM שלכם, ולמטרות ארוכות הטווח שלכם. לא עוד תבנית כללית — תוכנית שנבנית סביב המספרים שלכם.</p>\n<p><b>הקהילה</b> — הצטרפות לנבחרת של מתאמנים שעובדים לפי השיטה שלנו. אתם לא לבד בזה.</p>\n<p><b>תוצאות קבועות</b> — לא רק לקיץ הזה — אלא לכל החיים.</p>\n<p>אם 15 הימים האלה נתנו לכם טעימה של מה אפשרי כשעובדים נכון, מבוסס מדע — בואו נסגור ביחד את היעד הבא שלכם. שלחו לי הודעה, ונדבר על איך נראה המשך הדרך.</p>\n<h2>שקף 6 — המשימה האחרונה, והחגיגית (9:00-10:30)</h2>\n<div class=\"cue\">[שקף: תיעוד סופי, שיתוף הניצחון, מילה לעצמכם]</div>\n<p>שלוש משימות אחרונות.</p>\n<p><b>תיעוד סופי</b> — הזינו נתונים אחרונים ב-Sheets, וצלמו תמונת \"אחרי\" רשמית, באותם תנאים כמו התמונה מיום 1.</p>\n<p><b>שיתוף הניצחון</b> — שלחו לי את סיכום השינוי שלכם. אני רוצה לראות את הניצחון הזה.</p>\n<p><b>מילה לעצמכם</b> — רשמו דבר אחד שלמדתם על עצמכם, ועל כוח הרצון שלכם, בתהליך.</p>\n<p><b>זכרו: המשמעת היא החופש שלכם.</b></p>\n<h2>שקף 7 — סגירה (10:30-11:00)</h2>\n<div class=\"cue\">[שקף: \"תודה רבה וכל הכבוד! סיום האתגר הוא רק קו הזינוק לחיים החדשים שלכם\"]</div>\n<p>תודה רבה, וכל הכבוד. סיום האתגר הוא רק קו הזינוק לחיים החדשים שלכם.</p>\n<p>אני אביאל עמירה, WNBF Pro. נתראה בנבחרת המקצוענים.</p>"}];
let playing = false, raf = null, spd = 3, fs = 42, acc = 0;
const scroller = document.getElementById('scroller');

function openChap(i) {
  document.getElementById('content').innerHTML = chapters[i].h +
    '<div class="endmark">🎬 סוף הפרק — כל הכבוד!</div>';
  document.getElementById('title-tag').textContent = chapters[i].t;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('prompter').style.display = 'block';
  scroller.scrollTop = 0;
  stop();
}
function backToMenu() { stop(); document.getElementById('prompter').style.display = 'none'; document.getElementById('menu').style.display = 'block'; }
function restart() { scroller.scrollTop = 0; }
function step() {
  if (!playing) return;
  acc += 0.3 + spd * 0.45;            // px per frame
  const px = Math.floor(acc); acc -= px;
  if (px) scroller.scrollTop += px;
  if (scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - 2) { stop(); return; }
  raf = requestAnimationFrame(step);
}
function toggle() { playing ? stop() : start(); }
function start() { playing = true; document.getElementById('play').textContent = '⏸ עצור'; raf = requestAnimationFrame(step); }
function stop() { playing = false; document.getElementById('play').textContent = '▶ התחל'; if (raf) cancelAnimationFrame(raf); }
function speed(d) { spd = Math.min(10, Math.max(1, spd + d)); document.getElementById('spd').textContent = spd; }
function font(d) { fs = Math.min(90, Math.max(22, fs + d)); document.getElementById('fsz').textContent = fs; document.documentElement.style.setProperty('--fs', fs + 'px'); }
document.addEventListener('keydown', e => {
  if (document.getElementById('prompter').style.display !== 'block') return;
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
  if (e.code === 'ArrowUp') { e.preventDefault(); speed(1); }
  if (e.code === 'ArrowDown') { e.preventDefault(); speed(-1); }
  if (e.code === 'Escape') backToMenu();
});
</script>
